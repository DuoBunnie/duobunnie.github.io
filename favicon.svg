<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>

    <!-- Main body: lit from upper-left, deep rose at edges -->
    <radialGradient id="body" gradientUnits="userSpaceOnUse" cx="9" cy="7" r="24">
      <stop offset="0%"   stop-color="#ffe6f5"/>
      <stop offset="28%"  stop-color="#ffa0cc"/>
      <stop offset="62%"  stop-color="#ec4a94"/>
      <stop offset="100%" stop-color="#b01c62"/>
    </radialGradient>

    <!-- Specular shine: small bright spot, top-left -->
    <radialGradient id="shine" gradientUnits="userSpaceOnUse" cx="7" cy="6" r="7">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.82"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Rim darkening: subtle gradient from transparent → dark at bottom -->
    <linearGradient id="rim" gradientUnits="userSpaceOnUse" x1="0" y1="2" x2="0" y2="30">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.22"/>
    </linearGradient>

    <!-- Pink drop-shadow -->
    <filter id="glow" x="-18%" y="-12%" width="136%" height="136%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2"
                    flood-color="#d8308a" flood-opacity="0.55"/>
    </filter>

  </defs>

  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#0e0e0e"/>

  <!-- D shape — smooth bezier curves for a puffy, inflated silhouette -->
  <!-- Left bar: x 3–11  Bow: arcs out to x≈27 at midpoint (y=16)       -->
  <path id="d"
        d="M3,3 C3,2 4,2 5,2
           L11,2
           C23,2 27,8 27,16
           C27,24 23,30 11,30
           L5,30
           C4,30 3,30 3,29
           Z"
        fill="url(#body)"
        filter="url(#glow)"/>

  <!-- Rim shadow overlay (subtle depth at bottom) -->
  <use href="#d" fill="url(#rim)"/>

  <!-- Specular highlight overlay -->
  <use href="#d" fill="url(#shine)"/>

</svg>

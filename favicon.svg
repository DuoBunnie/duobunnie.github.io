<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>

    <!-- Background: soft pink radial, light center -->
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#fff0f8"/>
      <stop offset="100%" stop-color="#ffd0e8"/>
    </radialGradient>

    <!-- Heart tube body: lit from upper-left -->
    <radialGradient id="hbody" gradientUnits="userSpaceOnUse" cx="10.5" cy="8" r="20">
      <stop offset="0%"   stop-color="#fff4f9"/>
      <stop offset="22%"  stop-color="#ffc8e2"/>
      <stop offset="58%"  stop-color="#ff8ec4"/>
      <stop offset="100%" stop-color="#e868aa"/>
    </radialGradient>

    <!-- Specular highlight: soft white bloom upper-left -->
    <radialGradient id="shine" gradientUnits="userSpaceOnUse" cx="9" cy="7" r="6">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.90"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle bottom rim darkening for depth -->
    <linearGradient id="rim" gradientUnits="userSpaceOnUse" x1="0" y1="4" x2="0" y2="27">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.12"/>
    </linearGradient>

    <!-- Soft pink drop shadow -->
    <filter id="shadow" x="-25%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.8"
                    flood-color="#c050a0" flood-opacity="0.28"/>
    </filter>

  </defs>

  <!-- Background: light pink rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Heart outline ring: outer heart path + inner hole (evenodd) -->
  <path fill-rule="evenodd" fill="url(#hbody)" filter="url(#shadow)"
    d="M16,27
       C11,23 3,19 3,12
       C3,6 7,4 10.5,4
       C13.5,4 15,6 16,9
       C17,6 18.5,4 21.5,4
       C25,4 29,6 29,12
       C29,19 21,23 16,27Z
       M16,22
       C12.5,19 8.5,16.5 8.5,12.5
       C8.5,9 10.5,8 12.5,8
       C14,8 15.2,9 16,11
       C16.8,9 18,8 19.5,8
       C21.5,8 23.5,9 23.5,12.5
       C23.5,16.5 19.5,19 16,22Z"/>

  <!-- Rim shadow overlay for depth -->
  <path fill-rule="evenodd" fill="url(#rim)"
    d="M16,27
       C11,23 3,19 3,12
       C3,6 7,4 10.5,4
       C13.5,4 15,6 16,9
       C17,6 18.5,4 21.5,4
       C25,4 29,6 29,12
       C29,19 21,23 16,27Z
       M16,22
       C12.5,19 8.5,16.5 8.5,12.5
       C8.5,9 10.5,8 12.5,8
       C14,8 15.2,9 16,11
       C16.8,9 18,8 19.5,8
       C21.5,8 23.5,9 23.5,12.5
       C23.5,16.5 19.5,19 16,22Z"/>

  <!-- Specular highlight -->
  <path fill-rule="evenodd" fill="url(#shine)"
    d="M16,27
       C11,23 3,19 3,12
       C3,6 7,4 10.5,4
       C13.5,4 15,6 16,9
       C17,6 18.5,4 21.5,4
       C25,4 29,6 29,12
       C29,19 21,23 16,27Z
       M16,22
       C12.5,19 8.5,16.5 8.5,12.5
       C8.5,9 10.5,8 12.5,8
       C14,8 15.2,9 16,11
       C16.8,9 18,8 19.5,8
       C21.5,8 23.5,9 23.5,12.5
       C23.5,16.5 19.5,19 16,22Z"/>

</svg>

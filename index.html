<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duo — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #c8b4ff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c8b4ff 0%, #8b72f0 100%);
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-family: sans-serif;
      user-select: none;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: normal;
      letter-spacing: -0.5px;
      margin-bottom: 0.6rem;
    }

    .tagline {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2.4rem;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 auto 2.4rem;
      width: 48px;
    }

    .status {
      display: inline-block;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      color: var(--accent);
      background: rgba(200, 180, 255, 0.08);
      border: 1px solid rgba(200, 180, 255, 0.2);
      border-radius: 20px;
      padding: 0.3rem 0.9rem;
      margin-bottom: 2.4rem;
      letter-spacing: 0.04em;
    }

    .links {
      display: flex;
      gap: 1.4rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      color: var(--muted);
      text-decoration: none;
      font-family: sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }

    .links a:hover {
      color: var(--text);
    }

    footer {
      position: fixed;
      bottom: 1.6rem;
      font-family: sans-serif;
      font-size: 0.75rem;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="avatar">D</div>
    <h1>Duo</h1>
    <p class="tagline">Designer &amp; developer.<br>Something's being built here.</p>
    <hr class="divider">
    <span class="status">● site in progress</span>
    <div class="links">
      <a href="mailto:hello@duobunnie.com">email</a>
      <a href="https://github.com/duobunnie" target="_blank" rel="noopener">github</a>
      <a href="https://linkedin.com/in/duobunnie" target="_blank" rel="noopener">linkedin</a>
    </div>
  </div>
  <footer>duobunnie.github.io</footer>
</body>
</html>
